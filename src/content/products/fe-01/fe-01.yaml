product_number: FE-01
title: 'Grundbok: Järn'
description: |-
  Järn är magiskt. Jag har sett hur järn tas från mark och myrar. Jag har sett
  järn tvingas fram ur stenen med eld och blåsbälgar. Jag har sett järn härdas
  med eld och vatten. Jag har sett hjältar härdas med järn och blod. Jag har
  sett världens öde formas av järn och hjältars dåd. För järn är magiskt.
