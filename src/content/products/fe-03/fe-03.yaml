product_number: FE-03
title: 'Modul: Världsträdets grenar'
description: |-
  Följ med på en resa i det väldiga världsträdet, en resa som tar dig till de
  stormpiskade Järnklipporna, det bergiga Forland, till stäppland och vargland,
  och innanför Kungarikets gränsmurar. Följ med ner i Underjorden i
  Världsträdets stam, och högt upp i dess krona till ljusalvernas rike. Följ med
  oss bortom Världsträdet till Drakens land i Mundana, till Västmark på Lyonia,
  och till Missladal där Trollvintern härjar.
