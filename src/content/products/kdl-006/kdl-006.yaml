product_number: KDL-006
title: Illusion Edition - Original Kickstarter Version - Core Rules
description: |-
  The rare Illusion Edition of the Core Rules for KULT: Divinity Lost was part
  of the original Kickstarter, but the cover and internals are less explicit
  than other Kickstarter editions, similar to what was done with the more
  recently printed retail 4th Edition Core Rules. It has however never been sold
  in retail and have a different back cover.  
    
  Pick this version if you are a completionist!
