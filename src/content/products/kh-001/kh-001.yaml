product_number: KH-001
title: Kopparhavets hjältar - Grundbok
description: |-
  Innan Ereb Altor gavs ut till nya Drakar och Demoner gavs Kopparhavets hjältar
  ut med regelmotorn från Hjältarnas tid. Detta är inte kompatibelt med nya Ereb
  Altor men passa på att skaffa de sista exemplaren för en komplett samling.!  
    
  Kopparhavets hjältar är ett spännande äventyrsrollspel, med 230 sidor
  spelvärld, regler och äventyr. Grundboken innehåller allt du behöver för att
  spela Kopparhavets hjältar, förutom fantasi, tärningar och rollformulär.  
    
  PDF ingår.
